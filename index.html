<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Board Games Platform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; }
    .container { width: 90%; max-width: 800px; background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); padding: 40px; text-align: center; }
    h1 { font-size: 2.5em; color: #667eea; margin-bottom: 10px; }
    .subtitle { font-size: 1.1em; color: #666; margin-bottom: 30px; }
    .auth-section { margin-bottom: 30px; padding: 20px; background: #f8f9fa; border-radius: 12px; }
    .auth-section input { width: 100%; padding: 10px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 1em; }
    .auth-section button { width: 100%; padding: 10px; margin: 8px 0; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: bold; }
    .auth-section button:hover { background: #764ba2; }
    .modes { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
    .mode-btn { padding: 30px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 1.2em; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
    .mode-btn:hover { transform: scale(1.05); }
    .mode-btn.checkers { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .mode-btn.chess { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .mode-btn.ai { background: linear-gradient(135deg, #43e97b, #38f9d7); }
    .mode-btn.multi { background: linear-gradient(135deg, #fa709a, #fee140); }
    .user-info { margin-top: 20px; padding: 15px; background: #e8f4f8; border-radius: 8px; color: #333; }
    .user-info em { color: #667eea; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 Digital Board Games</h1>
    <p class="subtitle">Multiplayer Chess & Checkers with Real-Time Gameplay</p>
    
    <div class="auth-section" id="authSection">
      <h3>Sign In or Create Account</h3>
      <input type="text" id="username" placeholder="Username" />
      <input type="password" id="password" placeholder="Password" />
      <button id="signInBtn">Sign In / Register</button>
      <button id="guestBtn">Play as Guest</button>
    </div>

    <div id="gameSection" style="display:none;">
      <div class="user-info">Welcome, <em id="userDisplay">Guest</em>! 👋</div>
      
      <h2 style="margin-top:20px; color:#333;">Choose Your Game Mode</h2>
      <div class="modes">
        <button class="mode-btn checkers" onclick="startCheckers()">🔴 Checkers<br/>vs Player</button>
        <button class="mode-btn ai" onclick="startCheckersAI()">🤖 Checkers<br/>vs AI</button>
        <button class="mode-btn chess" onclick="startChess()">♟️ Chess<br/>vs Player</button>
        <button class="mode-btn multi" onclick="goToGameLobby()">🎲 Game<br/>Lobby</button>
      </div>
      
      <button id="signOutBtn" style="margin-top:20px; padding:10px 20px; background:#e74c3c; color:white; border:none; border-radius:8px; cursor:pointer;">Sign Out</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script>
    const socket = io('http://localhost:4000');
    let currentUser = null;

    // Auth handlers
    document.getElementById('signInBtn').addEventListener('click', async () => {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      if(!user || !pass) return alert('Enter username and password');
      
      try {
        const res = await fetch('http://localhost:4000/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });
        const data = await res.json();
        if(data.ok){
          currentUser = data.user;
          showGameMode();
        } else {
          alert(data.message || 'Auth failed');
        }
      } catch(e) { alert('Connection error: '+e.message); }
    });

    document.getElementById('guestBtn').addEventListener('click', () => {
      currentUser = { username: 'Guest', id: 'guest-'+Math.random().toString(36).slice(2,9) };
      showGameMode();
    });

    document.getElementById('signOutBtn').addEventListener('click', () => {
      currentUser = null;
      showAuthMode();
    });

    function showAuthMode(){
      document.getElementById('authSection').style.display = 'block';
      document.getElementById('gameSection').style.display = 'none';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    function showGameMode(){
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('gameSection').style.display = 'block';
      document.getElementById('userDisplay').textContent = currentUser.username;
    }

    function startCheckers(){
      const id = 'checkers-'+Math.random().toString(36).slice(2,9);
      sessionStorage.setItem('gameId', id);
      sessionStorage.setItem('gameType', 'checkers');
      window.location.href = '/frontend/index.html';
    }

    function startCheckersAI(){
      const id = 'ai-'+Math.random().toString(36).slice(2,9);
      sessionStorage.setItem('gameId', id);
      sessionStorage.setItem('gameType', 'checkers-ai');
      window.location.href = '/frontend/index.html';
    }

    function startChess(){
      alert('Chess coming soon!');
    }

    function goToGameLobby(){
      window.location.href = '/frontend/index.html';
    }

    // Try guest on load
    showAuthMode();
  </script>
</body>
</html>
