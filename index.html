<!DOCTYPE html>
<html>

<head>
<title>Digital Board Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎮 Digital Board Game</h1>


<div id="home">

<h2>Select Game</h2>

<button onclick="selectGame('chess')">
♟ Chess
</button>


<button onclick="selectGame('checkers')">
⚫ Checkers
</button>

</div>



<div id="modes" class="hide">

<h2>Play Mode</h2>


<button onclick="startGame('Create & Join')">
Create & Join
</button>


<button onclick="startGame('Play With Each Other')">
Play With Each Other
</button>


<button onclick="startGame('AI vs AI')">
AI vs AI
</button>


</div>



<h2 id="info"></h2>


<div id="board"></div>



<script src="app.js"></script>

</body>

</html>
